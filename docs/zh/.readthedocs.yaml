# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the version of Python and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.11"
  apt_packages:
    - doxygen
  jobs:
    install:
      - pip install -r docs/requirements.txt
    build:
      html:
        - cd docs && make cmake_intro
        - cd docs && make api_doc
        - cd docs && make zh
        - mkdir -p $READTHEDOCS_OUTPUT/html
        - cp -r docs/output/zh/html/* $READTHEDOCS_OUTPUT/html/
        - test -d docs/output/api_doc/html || { echo "api_doc/html missing; output tree:"; ls -R docs/output 2>/dev/null | head -40; exit 1; }
        - cp -r docs/output/api_doc/html $READTHEDOCS_OUTPUT/html/api_doc
